    config:
      temperature: 0
      max_tokens: 16384
  - id: anthropic:messages:claude-haiku-4-5-20251001
    config:
      temperature: 0
      max_tokens: 16384
  - id: openai:gpt-5.2
    config:
      temperature: 0
      max_tokens: 16384

  - id: google:gemini-3.1-pro-preview
    config:
      temperature: 0
      maxOutputTokens: 32768
      thinkingConfig:
          thinkingLevel: HIGH
